<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://*.firebaseio.com https://www.googleapis.com; connect-src 'self' https://*.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; object-src 'none'; frame-src 'self' https://accounts.google.com; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests">
  <title>Admin Dashboard | Relay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="styles.css">
  <script src="theme.js"></script>
</head>
<body>
  <main class="rl-settings-layout">
    <section class="rl-settings-card" id="admin-dashboard">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid var(--line); padding-bottom: 12px;">
        <h1 style="margin: 0; font-family: 'Space Grotesk', sans-serif;">System Administration</h1>
        <a href="chat.html" class="btn" style="text-decoration: none; font-size: 0.9rem;">← Back</a>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px;">
        <div style="background: var(--surface-2); padding: 16px; border-radius: 8px; text-align: center;">
          <p style="margin: 0 0 8px 0; color: var(--text-muted); font-size: 0.9rem; uppercase">Total Users</p>
          <span id="total-users" style="font-size: 2rem; font-weight: 700; color: var(--signal)">...</span>
        </div>
        <div style="background: var(--surface-2); padding: 16px; border-radius: 8px; text-align: center;">
          <p style="margin: 0 0 8px 0; color: var(--text-muted); font-size: 0.9rem; uppercase">Active Chats</p>
          <span id="total-chats" style="font-size: 2rem; font-weight: 700; color: var(--signal)">...</span>
        </div>
      </div>

      <div class="rl-settings-section">
        <h2>Managed Accounts</h2>
        <p class="rl-row-sub">Real-time index of registered application node configurations.</p>
        <div id="admin-users-list" style="margin-top: 16px;">
          <p class="rl-hint">Connecting to infrastructure stream...</p>
        </div>
      </div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="admin.js"></script>
</body>
</html>
